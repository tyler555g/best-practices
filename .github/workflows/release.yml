name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    # Only run after tests pass
    needs: []
    permissions:
      contents: write       # create GitHub releases + tags
      pull-requests: write  # changesets opens a Version PR

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so changesets can diff versions
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          # Authenticate to npm registry
          # See: https://docs.npmjs.com/creating-and-publishing-scoped-public-packages#publishing-scoped-public-packages
          registry-url: https://registry.npmjs.org

      - name: Install dependencies (lockfile-enforced)
        run: npm ci

      # Changesets will either:
      #   a) Open / update a "Version Packages" PR when changesets are present, OR
      #   b) Publish all packages to npm when that PR is merged
      # Scoped packages require `--access public`.
      # See: https://snyk.io/blog/best-practices-create-modern-npm-package/#automating-version-management-and-publishing
      - name: Create Version PR or Publish
        uses: changesets/action@v1
        with:
          publish: npm run release
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Use an Automation-type npm token (bypasses 2FA for CI).
          # Add NPM_TOKEN to repository secrets.
          # See: https://cheatsheetseries.owasp.org/cheatsheets/NPM_Security_Cheat_Sheet.html#8-enable-2fa
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
